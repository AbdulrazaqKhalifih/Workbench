services:
  postgres:
    image: postgres:18
    container_name: workbench-postgres
    environment:
      POSTGRES_DB: workbench
      POSTGRES_USER: workbench
      POSTGRES_PASSWORD: workbench
    ports:
      - "5433:5432"
    volumes:
      - workbench_pg:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: workbench-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no"]

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  workbench_pg:
